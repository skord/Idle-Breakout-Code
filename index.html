<!DOCTYPE html>
<html>
<head> 
  <title>Idle Breakout Savecode Generator</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="script.js"></script>
</head>
<body>
<h1>Idle Breakout Savecode Generator</h1>
<h3>--Load Existing Save--</h3>
<input type="text" placeholder="Paste base64 save code here" id="b64">
<br>
<button onclick="loadSave()">Load Save Code</button>
<div id="loadStatus"></div>
<br>
<h3>--Valuables--</h3>
<label for="level">Level</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="level">
<br>
<label for="money">Money</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="money">
<br>
<label for="gold">Gold</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="gold">
<br>
<label for="blackbricks">Black Bricks</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="blackbricks">
<br>
<label for="skillpoints">Skillpoints</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="skillpoints">
<br>
<h3>--Balls--</h3>
<label for="basic">Basic Ball</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="basic">
<br>
<label for="plasma">Plasma Ball</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="plasma">
<br>
<label for="sniper">Sniper Ball</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="sniper">
<br>
<label for="scatter">Scatter Ball</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="scatter">
<br>
<label for="cannon">Cannon Ball</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="cannon">
<br>
<label for="poison">Poison Ball</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="poison">
<br>
<h3>--Prestige Levels--</h3>
<label for="p1">Level Cash Complete Bonus</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="p1">
<br>
<label for="p2">Ball Speed Increase</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="p2">
<br>
<label for="p3">Ball Power Multiplier</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="p3">
<br>
<label for="p4">Unlock VAUS Laser</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="p4">
<br>
<label for="p5">Maximum Number of Balls</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="p5">
<br>
<h3>--Number of Upgrades--</h3>
<label for="u1">Basic Ball Speed</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u1">
<br>
<label for="u2">Basic Ball Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u2">
<br>
<label for="u3">Plasma Ball Range</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u3">
<br>
<label for="u4">Plasma Ball Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u4">
<br>
<label for="u5">Sniper Ball Speed</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u5">
<br>
<label for="u6">Sniper Ball Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u6">
<br>
<label for="u7">Scatter Ball Extra Balls</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u7">
<br>
<label for="u8">Scatter Ball Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u8">
<br>
<label for="u9">Cannon Ball Speed</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u9">
<br>
<label for="u10">Cannon Ball Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u10">
<br>
<label for="u11">Poison Ball Speed</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u11">
<br>
<label for="u12">Poison Ball Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u12">
<br>
<label for="u13">Laser(s) Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u13">
<br>
<label for="u14">Click Power</label>
<input type="number" onkeyup="getCode()" onkeydown="status()" id="u14">
<br>
<div id="output"></div>
<br>
<div id="status"></div>
<br>
<div id="rawData"></div>
</body>
</html>
